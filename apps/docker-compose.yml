services:
  ats_pg:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: ats
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ats-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ats"]
      interval: 5s
      timeout: 5s
      retries: 5

  ats_rd:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - ats-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./
      dockerfile: api/Dockerfile
      target: development
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
      - ./database:/database
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      ats_pg:
        condition: service_healthy
      ats_rd:
        condition: service_healthy
    networks:
      - ats-network

  worker:
    build:
      context: ./
      dockerfile: worker/Dockerfile
      target: development
    ipc: host
    init: true
    cap_add:
      - SYS_ADMIN 
    env_file:
      - ./worker/.env
    volumes:
      - ./worker:/app
      - worker_node_modules:/app/node_modules
      - ./database:/database
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      ats_pg:
        condition: service_healthy
      ats_rd:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - ats-network

  web:
    build:
      context: ./
      dockerfile: web/Dockerfile
      target: development
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    environment:
      - API_URL=http://api:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      - api
    networks:
      - ats-network

volumes:
  postgres_data:
  api_node_modules:
  worker_node_modules:
  web_node_modules:
  web_next:

networks:
  ats-network:
    driver: bridge
